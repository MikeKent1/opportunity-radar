name: Sync scheduled opportunities

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync EU/TED/Product Hunt opportunities
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      EU_INGEST_TOKEN: ${{ secrets.EU_INGEST_TOKEN }}
      PRODUCT_HUNT_API_KEY: ${{ secrets.PRODUCT_HUNT_API_KEY }}
      PRODUCT_HUNT_API_SECRET: ${{ secrets.PRODUCT_HUNT_API_SECRET }}
      PRODUCT_HUNT_ACCESS_TOKEN: ${{ secrets.PRODUCT_HUNT_ACCESS_TOKEN }}
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
      SUPABASE_PROJECT_REF: oqtqngqrelmszofoknqr

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --quiet kaggle

      - name: Sync scheduled opportunities
        run: npm run scheduled:sync
