name: Apply DB migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        shell: bash
        run: |
          ENCODED_PASSWORD="$(python -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["SUPABASE_DB_PASSWORD"], safe=""))')"
          DB_URL="postgresql://postgres:${ENCODED_PASSWORD}@db.oqtqngqrelmszofoknqr.supabase.co:5432/postgres"

          npx supabase db push --db-url "$DB_URL"
